name: Deploy Tado Dashboard

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build application
        run: ./gradlew bootJar -x test

      - name: Verify Java 21 bytecode
        run: |
          javap -verbose build/classes/java/main/uk/co/philharper/tadodashboard/TadoApplication.class | grep "major version: 65"

      - name: Copy JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "build/libs/*.jar"
          target: "/srv/apps/tado"

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            install -m 0644 /srv/apps/tado/build/libs/tado-dashboard-0.0.1-SNAPSHOT.jar /srv/apps/tado/app.jar
            mkdir -p /etc/systemd/system/tado.service.d
            cat > /etc/systemd/system/tado.service.d/override.conf <<'EOF'
            [Service]
            Environment="TADO_CLIENT_ID=${{ secrets.TADO_CLIENT_ID }}"
            Environment="TADO_CLIENT_SECRET=${{ secrets.TADO_CLIENT_SECRET }}"
            EOF
            systemctl daemon-reload
            systemctl restart tado
