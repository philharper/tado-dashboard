<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Heating Schedule</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="app-body">
<div class="app-shell app-shell-wide">
    <header class="topbar">
        <div class="brand">
            <span class="brand-mark">Tado Dashboard</span>
            <span class="brand-title">Heating schedule</span>
            <span class="brand-subtitle" th:text="${homeName} + ' home overview'"></span>
        </div>
        <div class="topbar-actions">
            <nav class="nav-pills" aria-label="Primary">
                <a class="nav-link active" th:href="@{/schedule}">Schedule</a>
                <a class="nav-link" th:href="@{/chart}">Temperature</a>
            </nav>
            <div class="user-pill">
                <div>
                    <strong th:text="${userInfo.name}">User</strong>
                    <span class="meta-text">Connected to Tado cloud</span>
                </div>
            </div>
            <form class="signout-form" th:action="@{/signout}" method="post">
                <button class="ghost-button" type="submit">Sign Out</button>
            </form>
        </div>
    </header>

    <main class="schedule-layout">
        <section class="schedule-workspace">
            <div class="schedule-toolbar">
                <div>
                    <h1 class="schedule-heading">Weekly programme</h1>
                    <p class="schedule-caption">One-day focus, 24-hour grid, room targets visible at a glance.</p>
                </div>
                <div class="schedule-toolbar-meta">
                    <span class="status-pill">24 hour view</span>
                    <span class="status-pill">Sticky room labels</span>
                </div>
            </div>

            <div class="day-tabs day-tabs-compact" aria-label="Days of week">
                <button class="tab-button" data-day="MONDAY" type="button">Mon</button>
                <button class="tab-button" data-day="TUESDAY" type="button">Tue</button>
                <button class="tab-button" data-day="WEDNESDAY" type="button">Wed</button>
                <button class="tab-button" data-day="THURSDAY" type="button">Thu</button>
                <button class="tab-button" data-day="FRIDAY" type="button">Fri</button>
                <button class="tab-button" data-day="SATURDAY" type="button">Sat</button>
                <button class="tab-button" data-day="SUNDAY" type="button">Sun</button>
            </div>

            <section th:each="entry : ${weeklySchedule.heatingSchedule}"
                     th:with="heatingSchedule=${entry.value}"
                     class="day-panel"
                     th:attr="data-day=${entry.key}">
                <div class="day-panel-header day-panel-header-compact">
                    <div>
                        <h2 class="day-title" th:text="${#strings.capitalize(#strings.toLowerCase(entry.key.toString()))}">Monday</h2>
                        <p class="table-note">Room targets for the selected day.</p>
                    </div>
                    <span class="status-pill" th:text="${#lists.size(heatingSchedule.roomSchedules)} + ' rooms'">0 rooms</span>
                </div>

                <div class="schedule-card schedule-card-tight">
                    <div class="table-scroll table-scroll-tall">
                        <table class="schedule-table schedule-table-compact">
                            <thead>
                            <tr>
                                <th class="room-head">Room</th>
                                <th th:each="hour : ${#numbers.sequence(0, 23)}" th:text="${#numbers.formatInteger(hour, 2)}">00</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="roomSchedule : ${heatingSchedule.roomSchedules}">
                                <td class="room-cell">
                                    <span class="schedule-room" th:text="${roomSchedule.name}">Living Room</span>
                                </td>
                                <td th:each="hourEntry : ${roomSchedule.hourlyTemperatures}"
                                    th:with="hourlyTemperature=${hourEntry.value}"
                                    class="temp-cell"
                                    th:style="|--cell-color:${hourlyTemperature.colour}|">
                                    <span class="temp-pill" th:text="${hourlyTemperature.temperature}">20</span>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </section>
    </main>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const tabs = Array.from(document.querySelectorAll(".tab-button"));
        const panels = Array.from(document.querySelectorAll(".day-panel"));

        function activateDay(day) {
            tabs.forEach((tab) => tab.classList.toggle("active", tab.dataset.day === day));
            panels.forEach((panel) => panel.classList.toggle("active", panel.dataset.day === day));
        }

        tabs.forEach((tab) => {
            tab.addEventListener("click", () => activateDay(tab.dataset.day));
        });

        const currentDay = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"][new Date().getDay()];
        const availableDay = tabs.some((tab) => tab.dataset.day === currentDay) ? currentDay : "MONDAY";
        activateDay(availableDay);
    });
</script>
</body>
</html>
