<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sign In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="auth-body">
<div class="auth-shell">
    <section class="auth-card">
        <div class="eyebrow">Tado Dashboard</div>
        <h1>Clean controls for home heating.</h1>
        <p class="auth-copy">Sign in with your Tado account to view schedules, compare room history, and inspect the current programme in one place.</p>
        <form th:action="@{/login}" method="post" class="login-form">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input class="field-input" type="text" id="username" name="username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="field-input" type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="primary-button">Sign In</button>
        </form>
    </section>
</div>
</body>
</html>
