<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sign In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="auth-body">
<div class="auth-shell">
    <section class="auth-card">
        <div class="eyebrow">Tado Dashboard</div>
        <h1>Clean controls for home heating.</h1>
        <p class="auth-copy">Start the Tado device login flow, complete authentication in the opened tab, and this page will move into the dashboard once the session is ready.</p>
        <form th:action="@{/login}" method="post" class="login-form">
            <button type="submit" class="primary-button">Continue to Tado</button>
        </form>
    </section>
</div>
</body>
</html>
