<!DOCTYPE html>
<html>
<head>
    <title>Signed Out</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-body">
<div class="auth-shell">
    <section class="auth-card narrow">
        <div class="eyebrow">Session Closed</div>
        <h1>Signed out cleanly.</h1>
        <p class="auth-copy">The dashboard session has been cleared. Sign in again whenever you want another live view of your home.</p>
        <form action="/login" method="get" style="margin-top: 28px;">
            <button class="primary-button" type="submit">Sign In Again</button>
        </form>
    </section>
</div>
</body>
</html>
