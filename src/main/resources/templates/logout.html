<!DOCTYPE html>
<html>
<head>
    <title>Logged Out</title>
    <style>
        body {
            background: #f7f9fa;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 2rem 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            text-align: center;
        }
        h2 {
            color: #2d3a4b;
            margin-bottom: 1rem;
        }
        p {
            color: #4a5a6a;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        .button {
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .button:hover {
            background: #217dbb;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Thank you for using the dashboard!</h2>
    <p>You have been successfully logged out.</p>
    <form action="/login" method="get">
        <button class="button" type="submit">Sign In Again</button>
    </form>
</div>
</body>
</html>
