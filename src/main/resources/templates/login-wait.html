<!DOCTYPE html>
<html>
<head>
    <title>Waiting For Authentication</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="5">
    <link rel="stylesheet" href="/css/styles.css">
    <script>
        setTimeout(function () {
            window.location.reload();
        }, 5000);
    </script>
</head>
<body class="auth-body">
<div class="auth-shell">
    <section class="auth-card narrow">
        <div class="spinner"></div>
        <div class="eyebrow">Authorisation In Progress</div>
        <h1>Waiting for Tado authentication.</h1>
        <p class="auth-copy">
            Finish the sign-in flow in the newly opened tab.
            This page refreshes every 5 seconds until the session is ready.
        </p>
    </section>
</div>
</body>
</html>
