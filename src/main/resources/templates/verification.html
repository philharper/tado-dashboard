<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Redirecting To Tado</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script th:inline="javascript">
        window.onload = function () {
            const url = /*[[${verificationUriComplete}]]*/ "";
            window.open(url, "_blank");
            window.location.href = "/login-wait";
        };
    </script>
</head>
<body class="auth-body">
<div class="auth-shell">
    <section class="auth-card narrow">
        <div class="spinner"></div>
        <div class="eyebrow">Launching Verification</div>
        <h1>Opening the Tado login flow.</h1>
        <p class="auth-copy">If a new tab does not open automatically, allow pop-ups for this site and try signing in again.</p>
    </section>
</div>
</body>
</html>
